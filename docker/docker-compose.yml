version: '3.8'

# ─────────────────────────────────────────────
# Ussop Production Stack
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
# ─────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL: postgresql+psycopg2://ussop:${POSTGRES_PASSWORD:-ussop}@postgres:5432/ussop
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  ENCODER_PATH: /app/models/resnet18_image_encoder.onnx
  DECODER_PATH: /app/models/mobile_sam_mask_decoder.onnx
  CAMERA_TYPE: mock

services:

  # ── API server ─────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ussop-api
    ports:
      - "8080:8080"
      - "4840:4840"       # OPC-UA server (disabled unless OPCUA_ENABLED=true)
    volumes:
      - app-data:/app/data
      - ./models:/app/models:ro
    environment:
      <<: *common-env
      API_WORKERS: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Background worker (batch + training) ───
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ussop-worker
    command: python -m ussop.worker
    volumes:
      - app-data:/app/data
      - ./models:/app/models
    environment:
      <<: *common-env
      WORKER_MODE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ussop-postgres
    environment:
      POSTGRES_USER: ussop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ussop}
      POSTGRES_DB: ussop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ussop"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (cache + pub/sub) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: ussop-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── nginx reverse proxy (TLS termination) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: ussop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - app-data:/app/data:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Prometheus (metrics scraping) ──────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ussop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  # ── Grafana (dashboards) ───────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ussop-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
